# SonarQube Configuration
sonar.projectKey=devopsia3
sonar.organization=jeremiah
sonar.projectName=DevSecOps Web Application
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=.
sonar.inclusions=app.js

# Exclude non-source files
sonar.exclusions=node_modules/**,coverage/**,k8s/**,terraform/**,*.test.js,*.md

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Test configuration
sonar.tests=.
sonar.test.inclusions=*.test.js

# Coverage (if generated)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
