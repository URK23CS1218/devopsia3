# ============================================================
# DevSecOps CI/CD Pipeline
# Integrates security scanning at every stage of delivery
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-webapp
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────
  # Stage 1: BUILD — Install dependencies and run tests
  # ──────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            app.js
            package.json
            package-lock.json

  # ──────────────────────────────────────────────────────────
  # Stage 2: SAST SCAN — SonarQube static analysis
  # ──────────────────────────────────────────────────────────
  sast-scan:
    name: 🔍 SAST Scan (SonarQube)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full clone for SonarQube analysis

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # Stage 3: DOCKERISE — Build Docker image
  # ──────────────────────────────────────────────────────────
  dockerise:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "📦 Building Docker image..."
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Docker image built successfully"

      - name: Save Docker image
        run: docker save ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} -o /tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Stage 4: CONTAINER SCAN — Trivy vulnerability scanning
  # ──────────────────────────────────────────────────────────
  container-scan:
    name: 🛡️ Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: dockerise

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Run Trivy vulnerability scanner (Table)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Run Trivy vulnerability scanner (JSON Report)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

  # ──────────────────────────────────────────────────────────
  # Stage 5: SECURITY GATE — Fail if critical vulns found
  # ──────────────────────────────────────────────────────────
  security-gate:
    name: 🚦 Security Gate Check
    runs-on: ubuntu-latest
    needs: container-scan

    steps:
      - name: Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results

      - name: Evaluate security gate
        run: |
          echo "🔐 Evaluating Security Gate..."
          echo "================================"

          # Count vulnerabilities by severity
          CRITICAL=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
          HIGH=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length')
          MEDIUM=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length')
          LOW=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length')

          echo "📊 Vulnerability Summary:"
          echo "  🔴 CRITICAL: $CRITICAL"
          echo "  🟠 HIGH:     $HIGH"
          echo "  🟡 MEDIUM:   $MEDIUM"
          echo "  🟢 LOW:      $LOW"
          echo "  📊 TOTAL:    $((CRITICAL + HIGH + MEDIUM + LOW))"
          echo "================================"

          # Security Gate: FAIL if any CRITICAL vulnerabilities
          if [ "$CRITICAL" -gt 0 ]; then
            echo ""
            echo "❌ SECURITY GATE FAILED!"
            echo "   Found $CRITICAL CRITICAL vulnerabilities."
            echo "   Pipeline blocked — fix critical CVEs before deploying."
            echo ""
            exit 1
          fi

          echo ""
          echo "✅ SECURITY GATE PASSED!"
          echo "   No CRITICAL vulnerabilities detected."
          echo "   Proceeding to deployment stages..."
          echo ""

  # ──────────────────────────────────────────────────────────
  # Stage 6: PUSH TO REGISTRY — Push image to Docker Hub
  # ──────────────────────────────────────────────────────────
  push-to-registry:
    name: 📤 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          echo "📤 Pushing image to Docker Hub..."
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Image pushed successfully"

  # ──────────────────────────────────────────────────────────
  # Stage 7: TERRAFORM PROVISION — Provision infrastructure
  # ──────────────────────────────────────────────────────────
  terraform-provision:
    name: 🏗️ Terraform Provision
    runs-on: ubuntu-latest
    needs: push-to-registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────────────────
  # Stage 8: KUBERNETES DEPLOY — Deploy to K8s cluster
  # ──────────────────────────────────────────────────────────
  kubernetes-deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: terraform-provision

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          echo "🚀 Deploying to Kubernetes..."

          # Apply manifests in order
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

          echo "✅ Manifests applied successfully"

      - name: Update deployment image
        run: |
          kubectl set image deployment/devsecops-webapp \
            webapp=${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} \
            -n devsecops-app

      - name: Wait for rollout
        run: |
          echo "⏳ Waiting for deployment rollout..."
          kubectl rollout status deployment/devsecops-webapp \
            -n devsecops-app \
            --timeout=120s
          echo "✅ Deployment rolled out successfully!"

      - name: Verify deployment
        run: |
          echo "📋 Deployment Status:"
          kubectl get pods -n devsecops-app
          echo ""
          echo "📋 Service Status:"
          kubectl get svc -n devsecops-app
          echo ""
          echo "🎉 DevSecOps Pipeline Complete!"
