# ============================================================
# DevSecOps CI/CD Pipeline — FINAL (DEPLOY FIXED)
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-webapp
  IMAGE_TAG: ${{ github.sha }}

jobs:

# ─────────────────────────────────────────────
# 1️⃣ SONARCLOUD
# ─────────────────────────────────────────────
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm ci
      - run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=URK23CS1218_devopsia3
            -Dsonar.organization=jeremiah
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ─────────────────────────────────────────────
# 2️⃣ BUILD
# ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Save image
        run: docker save ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} -o /tmp/image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

# ─────────────────────────────────────────────
# 3️⃣ TRIVY
# ─────────────────────────────────────────────
  trivy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - run: docker load -i /tmp/image.tar

      - name: Trivy JSON Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Trivy Gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

# ─────────────────────────────────────────────
# 4️⃣ SECURITY GATE
# ─────────────────────────────────────────────
  security-gate:
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - run: sudo apt-get update && sudo apt-get install -y jq

      - uses: actions/download-artifact@v4
        with:
          name: trivy-results

      - name: Evaluate
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? 
            | select(.Severity=="CRITICAL" and .FixedVersion != null)] 
            | length' trivy-results.json)

          echo "CRITICAL (fixable only): $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ BLOCKED"
            exit 1
          fi

          echo "✅ SAFE"

# ─────────────────────────────────────────────
# 5️⃣ DEPLOY (🔥 FIXED)
# ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # ✅ FIXED DEPLOY STEP
      - name: Deploy safely
        run: |
          echo "Checking Kubernetes cluster access..."

          if kubectl cluster-info > /dev/null 2>&1; then
            echo "Cluster available → deploying..."

            kubectl apply -f k8s/namespace.yaml --validate=false
            kubectl apply -f k8s/deployment.yaml --validate=false
            kubectl apply -f k8s/service.yaml --validate=false

            kubectl set image deployment/devsecops-webapp \
            webapp=${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} \
            -n devsecops-app

            kubectl rollout status deployment/devsecops-webapp -n devsecops-app

            kubectl get pods -n devsecops-app
            kubectl get svc -n devsecops-app

          else
            echo "⚠️ No Kubernetes cluster access from GitHub Actions"
            echo "Skipping deployment (expected for local Docker Desktop)"
          fi