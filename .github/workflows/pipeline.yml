# ============================================================
# DevSecOps CI/CD Pipeline — 5-Stage Architecture
# sonarcloud → build → trivy → security-gate → deploy
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-webapp
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────
  # Stage 1: SONARCLOUD — Static Application Security Testing
  # ──────────────────────────────────────────────────────────
  sonarcloud:
    name: 🔍 SonarCloud SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=devopsia3
            -Dsonar.organization=jeremiah
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # Stage 2: BUILD — Docker build + push to Docker Hub
  # ──────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          echo "📦 Building Docker image..."
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Docker image built successfully"

      - name: Push Docker image
        run: |
          echo "📤 Pushing image to Docker Hub..."
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Image pushed: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}"

      - name: Save Docker image for Trivy
        run: docker save ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} -o /tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Stage 3: TRIVY — Container vulnerability scanning
  #   Run 1: Save full JSON report as downloadable artifact
  #   Run 2: Block pipeline on CRITICAL + ignore-unfixed
  # ──────────────────────────────────────────────────────────
  trivy:
    name: 🛡️ Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      # Run 1: Full scan → save JSON report as artifact
      - name: Trivy scan — Full JSON report
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      # Run 2: Block pipeline on CRITICAL (ignore unfixed)
      - name: Trivy scan — Block on CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

  # ──────────────────────────────────────────────────────────
  # Stage 4: SECURITY GATE — Evaluate scan results
  # ──────────────────────────────────────────────────────────
  security-gate:
    name: 🚦 Security Gate
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results

      - name: Evaluate security gate
        run: |
          echo "🔐 Evaluating Security Gate..."
          echo "================================"

          # Count vulnerabilities by severity
          CRITICAL=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
          HIGH=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length')
          MEDIUM=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length')
          LOW=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length')

          echo "📊 Vulnerability Summary:"
          echo "  🔴 CRITICAL: $CRITICAL"
          echo "  🟠 HIGH:     $HIGH"
          echo "  🟡 MEDIUM:   $MEDIUM"
          echo "  🟢 LOW:      $LOW"
          echo "  📊 TOTAL:    $((CRITICAL + HIGH + MEDIUM + LOW))"
          echo "================================"

          if [ "$CRITICAL" -gt 0 ]; then
            echo ""
            echo "❌ SECURITY GATE FAILED!"
            echo "   Found $CRITICAL CRITICAL vulnerabilities."
            echo "   Pipeline blocked — fix critical CVEs before deploying."
            exit 1
          fi

          echo ""
          echo "✅ SECURITY GATE PASSED!"
          echo "   No CRITICAL vulnerabilities detected."
          echo "   Proceeding to deployment..."

  # ──────────────────────────────────────────────────────────
  # Stage 5: DEPLOY — Deploy to Kubernetes cluster
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          echo "🚀 Deploying to Kubernetes..."
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          echo "✅ Manifests applied"

      - name: Update deployment image
        run: |
          kubectl set image deployment/devsecops-webapp \
            webapp=${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} \
            -n devsecops-app

      - name: Wait for rollout
        run: |
          echo "⏳ Waiting for deployment rollout..."
          kubectl rollout status deployment/devsecops-webapp \
            -n devsecops-app \
            --timeout=120s
          echo "✅ Deployment rolled out successfully!"

      - name: Verify deployment
        run: |
          echo "📋 Deployment Status:"
          kubectl get pods -n devsecops-app
          echo ""
          echo "📋 Service Status:"
          kubectl get svc -n devsecops-app
          echo ""
          echo "🎉 DevSecOps Pipeline Complete!"
