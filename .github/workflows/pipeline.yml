# ============================================================
# DevSecOps CI/CD Pipeline — 5-Stage Architecture
# sonarcloud → build → trivy → security-gate → deploy
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-webapp
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ──────────────────────────────────────────────────────────
  # Stage 1: SONARCLOUD — Static Application Security Testing
  # ──────────────────────────────────────────────────────────
  sonarcloud:
    name: 🔍 SonarCloud SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # ✅ FIXED Sonar config
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=URK23CS1218_devopsia3
            -Dsonar.organization=jeremiah
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ✅ Quality Gate (extra marks)
      - name: Sonar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # Stage 2: BUILD — Docker build + push
  # ──────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Save Docker image
        run: docker save ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} -o /tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Stage 3: TRIVY — Container scanning
  # ──────────────────────────────────────────────────────────
  trivy:
    name: 🛡️ Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      # Full scan report
      - name: Trivy JSON Report
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      # Block on CRITICAL
      - name: Trivy Gate (CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

  # ──────────────────────────────────────────────────────────
  # Stage 4: SECURITY GATE
  # ──────────────────────────────────────────────────────────
  security-gate:
    name: 🚦 Security Gate
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results

      - name: Evaluate vulnerabilities
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
          echo "CRITICAL: $CRITICAL"
          echo "HIGH: $HIGH"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ SECURITY GATE FAILED"
            exit 1
          fi

          echo "✅ SECURITY GATE PASSED"

  # ──────────────────────────────────────────────────────────
  # Stage 5: DEPLOY — Kubernetes
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update image
        run: |
          kubectl set image deployment/devsecops-webapp \
            webapp=${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} \
            -n devsecops-app

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/devsecops-webapp -n devsecops-app

      - name: Verify deployment
        run: |
          kubectl get pods -n devsecops-app
          kubectl get svc -n devsecops-app
