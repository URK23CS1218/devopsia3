apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: myapp-prod
  labels:
    app: myapp
    environment: production
  annotations:
    description: "Expose myapp service via NodePort for DevSecOps AI project"
    created-by: "CI/CD pipeline"

spec:
  type: NodePort

  selector:
    app: myapp

  ports:
    - protocol: TCP
      port: 80          # Cluster internal
      targetPort: 3000  # Container port
      nodePort: 30007   # Fixed External access for presentation
