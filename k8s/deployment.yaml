apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: myapp-prod
  labels:
    app: myapp
    environment: production

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp
        environment: production

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

      containers:
        - name: myapp

          # ✅ FIX: CI/CD IMAGE (replace dynamically)
          image: devopslab1218/myapp:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          # ── Security ─────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ── Resources ────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          # ── Environment (FROM SECRET) ────────────
          env:
            - name: NODE_ENV
              value: "production"

            - name: PORT
              value: "3000"

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: myapp-secrets
                  key: DATABASE_URL

            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: myapp-secrets
                  key: API_KEY

          # ── Liveness Probe ───────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15

          # ── Readiness Probe ──────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
