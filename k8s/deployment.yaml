apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-webapp
  namespace: devsecops-app
  labels:
    app: devsecops-webapp
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-webapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devsecops-webapp
        version: "1.0.0"
    spec:
      # Security: run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: webapp
          image: urk23cs1218/devsecops-webapp:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          # Environment variables from Kubernetes Secret
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: API_KEY
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          # Resource limits
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
